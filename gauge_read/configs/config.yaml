system:
  cuda: true
  num_workers: 0

experiment:
  exp_name: multimodal_convnext
  save_dir: logs
  resume: ""

model:
  net: convnext_tiny
  use_multimodal: true
  means: [0.485, 0.456, 0.406]
  stds: [0.229, 0.224, 0.225]

data:
  test_size: [512, 1024]
  stn_correction: true
  stn_model_path: logs/stn_convnext/ep2_loss0.1756.pth

predict:
  model_path: logs/multimodal_convnext/textgraph_convnext_tiny_25.pth
  use_yolo: true
  use_stn: true

training:
  seed: 114514
  max_epoch: 100
  start_epoch: 0
  batch_size: 2
  lr: 0.0001
  lr_adjust: cosine
  optim: AdamW
  weight_decay: 0.01
  eta_min: 0.000001
  cosine_t_max: 101
  gamma: 0.1
  momentum: 0.9
  save_freq: 5
  display_freq: 10
